<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <defs>
    <filter id="card-shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1e40af"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
    <marker id="arr-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="360" fill="#f1f5f9" rx="10"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="2">SOURCE OF TRUTH  ·  WORKING SURFACE</text>

  <!-- ── LEFT: Platform ── -->
  <rect x="16" y="48" width="356" height="244" fill="white" rx="10" filter="url(#card-shadow)"/>
  <rect x="16" y="48" width="356" height="40" fill="#1e293b" rx="10"/>
  <rect x="16" y="78" width="356" height="14" fill="#1e293b"/>
  <text x="194" y="74" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="white">☁  GitHub / Bitbucket</text>
  <text x="194" y="106" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="#64748b" font-weight="600" letter-spacing="1">SOURCE OF TRUTH</text>

  <!-- Items -->
  <rect x="36" y="124" width="316" height="34" fill="#eff6ff" rx="6"/>
  <text x="52" y="146" font-family="system-ui,sans-serif" font-size="14">🔒</text>
  <text x="78" y="140" font-family="system-ui,sans-serif" font-size="11.5" font-weight="700" fill="#1e293b">Merge gating &amp; branch protection</text>
  <text x="78" y="154" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Required reviews, status checks, rules</text>

  <rect x="36" y="166" width="316" height="34" fill="#eff6ff" rx="6"/>
  <text x="52" y="188" font-family="system-ui,sans-serif" font-size="14">✅</text>
  <text x="78" y="182" font-family="system-ui,sans-serif" font-size="11.5" font-weight="700" fill="#1e293b">CI / status checks</text>
  <text x="78" y="196" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Builds, tests, deploy gates</text>

  <rect x="36" y="208" width="316" height="34" fill="#eff6ff" rx="6"/>
  <text x="52" y="230" font-family="system-ui,sans-serif" font-size="14">👥</text>
  <text x="78" y="224" font-family="system-ui,sans-serif" font-size="11.5" font-weight="700" fill="#1e293b">Approvals &amp; required reviewers</text>
  <text x="78" y="238" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Codeowners, team policies</text>

  <rect x="36" y="250" width="316" height="34" fill="#eff6ff" rx="6"/>
  <text x="52" y="272" font-family="system-ui,sans-serif" font-size="14">📋</text>
  <text x="78" y="266" font-family="system-ui,sans-serif" font-size="11.5" font-weight="700" fill="#1e293b">Audit trail &amp; history</text>
  <text x="78" y="280" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Comments, reviews, timeline</text>

  <!-- ── RIGHT: branchdiff ── -->
  <rect x="428" y="48" width="356" height="244" fill="white" rx="10" filter="url(#card-shadow)"/>
  <rect x="428" y="48" width="356" height="40" fill="#1e40af" rx="10"/>
  <rect x="428" y="78" width="356" height="14" fill="#1e40af"/>
  <text x="606" y="74" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="white">💻  branchdiff (localhost)</text>
  <text x="606" y="106" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="#64748b" font-weight="600" letter-spacing="1">WORKING SURFACE</text>

  <rect x="448" y="124" width="316" height="34" fill="#f5f3ff" rx="6"/>
  <text x="464" y="146" font-family="system-ui,sans-serif" font-size="14">📄</text>
  <text x="490" y="140" font-family="system-ui,sans-serif" font-size="11.5" font-weight="700" fill="#1e293b">Read full-context diff</text>
  <text x="490" y="154" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Split / unified, syntax for 150+ langs</text>

  <rect x="448" y="166" width="316" height="34" fill="#f5f3ff" rx="6"/>
  <text x="464" y="188" font-family="system-ui,sans-serif" font-size="14">👁</text>
  <text x="490" y="182" font-family="system-ui,sans-serif" font-size="11.5" font-weight="700" fill="#1e293b">Viewed / stale file tracking</text>
  <text x="490" y="196" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Hash-based, survives force-push</text>

  <rect x="448" y="208" width="316" height="34" fill="#f5f3ff" rx="6"/>
  <text x="464" y="230" font-family="system-ui,sans-serif" font-size="14">💬</text>
  <text x="490" y="224" font-family="system-ui,sans-serif" font-size="11.5" font-weight="700" fill="#1e293b">Draft &amp; triage comments</text>
  <text x="490" y="238" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Tagged, dismissable, local SQLite</text>

  <rect x="448" y="250" width="316" height="34" fill="#f5f3ff" rx="6"/>
  <text x="464" y="272" font-family="system-ui,sans-serif" font-size="14">🤖</text>
  <text x="490" y="266" font-family="system-ui,sans-serif" font-size="11.5" font-weight="700" fill="#1e293b">AI review passes</text>
  <text x="490" y="280" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Same diff, same lines, your gate</text>

  <!-- Bidirectional sync arrows -->
  <path d="M 372 158 C 395 158, 405 158, 428 158" stroke="#1e40af" stroke-width="2" fill="none" marker-end="url(#arr-blue)"/>
  <path d="M 428 200 C 405 200, 395 200, 372 200" stroke="#b45309" stroke-width="2" fill="none" marker-end="url(#arr-amber)"/>
  <text x="400" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#1e40af">Pull from PR</text>
  <text x="400" y="216" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#b45309">Push to PR</text>
  <text x="400" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#64748b" font-style="italic">(opt-in)</text>

  <!-- Bottom callout -->
  <rect x="16" y="308" width="768" height="40" fill="white" rx="8" filter="url(#card-shadow)"/>
  <text x="36" y="324" font-family="system-ui,sans-serif" font-size="11" fill="#475569">
    <tspan font-weight="700" fill="#1e293b">Lifecycle actions</tspan> (approve · merge · close · edit) → <tspan font-family="ui-monospace,monospace" fill="#1e40af">gh / Bitbucket REST API</tspan> · platform records the action with the same timestamp
  </text>
  <text x="36" y="340" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8" font-style="italic">Uninstall branchdiff tomorrow → review process keeps working. The right column is a convenience layer.</text>
</svg>
