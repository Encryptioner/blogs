<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="900" height="580">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="write-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="read-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#94a3b8" letter-spacing="2">THE 90% LEVER — PROMPT CACHING ACROSS PROVIDERS (2026)</text>

  <!-- ═══ THREE VENDOR CARDS ═══ -->
  <!-- Anthropic card -->
  <rect x="24" y="50" width="272" height="200" fill="white" rx="10" filter="url(#shadow)"/>
  <rect x="24" y="50" width="272" height="40" fill="url(#hdr)" rx="10"/>
  <rect x="24" y="78" width="272" height="12" fill="url(#hdr)"/>
  <text x="160" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="white">Anthropic · Claude</text>

  <text x="40" y="114" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#94a3b8" letter-spacing="1">TTL</text>
  <text x="40" y="132" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#1e293b">5 min or 1 hour</text>
  <text x="40" y="148" font-family="system-ui,sans-serif" font-size="9.5" fill="#64748b">(opt-in, explicit)</text>

  <text x="40" y="178" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#94a3b8" letter-spacing="1">WRITE (first hit)</text>
  <rect x="40" y="184" width="156" height="14" fill="url(#write-grad)" rx="3"/>
  <text x="202" y="195" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#b45309">1.25× input (5m)</text>

  <text x="40" y="222" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#94a3b8" letter-spacing="1">READ (cache hit)</text>
  <rect x="40" y="228" width="78" height="14" fill="url(#read-grad)" rx="3"/>
  <text x="124" y="239" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#065f46">0.10× input · 90% off</text>

  <!-- OpenAI card -->
  <rect x="314" y="50" width="272" height="200" fill="white" rx="10" filter="url(#shadow)"/>
  <rect x="314" y="50" width="272" height="40" fill="url(#hdr)" rx="10"/>
  <rect x="314" y="78" width="272" height="12" fill="url(#hdr)"/>
  <text x="450" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="white">OpenAI · GPT-5.x</text>

  <text x="330" y="114" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#94a3b8" letter-spacing="1">TTL</text>
  <text x="330" y="132" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#1e293b">up to 24 hours</text>
  <text x="330" y="148" font-family="system-ui,sans-serif" font-size="9.5" fill="#64748b">(default on 5.5+, no fee)</text>

  <text x="330" y="178" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#94a3b8" letter-spacing="1">WRITE</text>
  <rect x="330" y="184" width="125" height="14" fill="url(#write-grad)" rx="3"/>
  <text x="461" y="195" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#b45309">1.0× input · no fee</text>

  <text x="330" y="222" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#94a3b8" letter-spacing="1">READ (cache hit)</text>
  <rect x="330" y="228" width="78" height="14" fill="url(#read-grad)" rx="3"/>
  <text x="414" y="239" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#065f46">0.50× · 50% off (≥1024 tok)</text>

  <!-- Gemini card -->
  <rect x="604" y="50" width="272" height="200" fill="white" rx="10" filter="url(#shadow)"/>
  <rect x="604" y="50" width="272" height="40" fill="url(#hdr)" rx="10"/>
  <rect x="604" y="78" width="272" height="12" fill="url(#hdr)"/>
  <text x="740" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="white">Google · Gemini</text>

  <text x="620" y="114" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#94a3b8" letter-spacing="1">TTL</text>
  <text x="620" y="132" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#1e293b">60 min default</text>
  <text x="620" y="148" font-family="system-ui,sans-serif" font-size="9.5" fill="#64748b">(explicit; implicit auto)</text>

  <text x="620" y="178" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#94a3b8" letter-spacing="1">WRITE</text>
  <rect x="620" y="184" width="125" height="14" fill="url(#write-grad)" rx="3"/>
  <text x="751" y="195" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#b45309">1.0× + storage cost</text>

  <text x="620" y="222" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#94a3b8" letter-spacing="1">READ (cache hit)</text>
  <rect x="620" y="228" width="78" height="14" fill="url(#read-grad)" rx="3"/>
  <text x="704" y="239" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#065f46">0.10× · 90% off (3.x)</text>

  <!-- ═══ BOTTOM: BREAK-EVEN + TTL CLIFF ═══ -->
  <rect x="24" y="266" width="426" height="284" fill="white" rx="10" filter="url(#shadow)"/>
  <text x="237" y="294" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#1e293b">Break-even: &gt;1.3 reads per write</text>
  <text x="40" y="316" font-family="system-ui,sans-serif" font-size="10.5" fill="#64748b">A cached prefix pays for itself only if it is read again before the TTL expires. Below the line, caching</text>
  <text x="40" y="332" font-family="system-ui,sans-serif" font-size="10.5" fill="#64748b">costs MORE than re-sending the prompt — the write surcharge has no reads to amortize it.</text>

  <!-- break-even chart -->
  <text x="40" y="364" font-family="system-ui,sans-serif" font-size="9.5" fill="#94a3b8">cost vs reads/writes (relative)</text>
  <line x1="60" y1="510" x2="420" y2="510" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="60" y1="380" x2="60" y2="510" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="430" y="514" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">reads →</text>
  <text x="56" y="384" text-anchor="end" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">$$</text>

  <!-- no-cache flat line -->
  <line x1="60" y1="430" x2="420" y2="430" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="340" y="424" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#64748b">no cache (flat)</text>

  <!-- cache line: starts high, drops -->
  <line x1="60" y1="395" x2="200" y2="395" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="66" y="390" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#b45309">write surcharge</text>
  <polyline points="200,395 260,432 320,460 420,485" fill="none" stroke="#10b981" stroke-width="2.5"/>
  <text x="320" y="478" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#065f46">reads = 90% off</text>

  <!-- crossover marker -->
  <circle cx="262" cy="430" r="4" fill="#ef4444"/>
  <text x="270" y="422" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#ef4444">~1.3 reads: breaks even</text>

  <!-- right card: TTL cliff -->
  <rect x="468" y="266" width="408" height="284" fill="white" rx="10" filter="url(#shadow)"/>
  <text x="672" y="294" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#1e293b">The 5-minute TTL cliff</text>
  <text x="484" y="316" font-family="system-ui,sans-serif" font-size="10.5" fill="#64748b">Anthropic dropped the cache TTL from 60 min → 5 min in early 2026. Workloads built for the old</text>
  <text x="484" y="332" font-family="system-ui,sans-serif" font-size="10.5" fill="#64748b">window saw savings fall from ~84% → ~52% as every call past 300s became a fresh write.</text>

  <!-- timeline -->
  <line x1="494" y1="380" x2="850" y2="380" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="494" y="372" width="234" height="16" fill="#dcfce7" rx="3"/>
  <text x="510" y="384" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#166534">cache warm — reads at 0.10×</text>
  <rect x="728" y="372" width="122" height="16" fill="#fee2e2" rx="3"/>
  <text x="740" y="384" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#991b1b">expired — full re-write</text>

  <line x1="728" y1="362" x2="728" y2="392" stroke="#ef4444" stroke-width="2"/>
  <text x="728" y="356" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#ef4444">300s cliff</text>

  <text x="484" y="412" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#1e293b">Mitigations that hold the cache warm:</text>
  <text x="484" y="432" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">• <tspan font-weight="700" fill="#1e293b">Batch within the window</tspan> — cluster work so all reads land before 300s</text>
  <text x="484" y="450" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">• <tspan font-weight="700" fill="#1e293b">Keep-alive ping</tspan> — a light request every ~4 min resets the TTL clock</text>
  <text x="484" y="468" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">• <tspan font-weight="700" fill="#1e293b">Batch API</tspan> — first item writes, the rest read at 10% + 50% batch off</text>
  <text x="484" y="486" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">• <tspan font-weight="700" fill="#1e293b">Static-prefix-first</tspan> — put unchanging bytes at the very front, never the back</text>
  <text x="484" y="520" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">Sources: Anthropic + OpenAI + Google caching docs; caching-TTL analyses (dev.to/@whoffagents, 2026).</text>
</svg>
