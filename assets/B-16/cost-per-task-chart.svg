<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" width="860" height="460">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="flash-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="pro-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="460" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#94a3b8" letter-spacing="2">CHEAPER PER TOKEN ≠ CHEAPER PER TASK</text>

  <!-- Legend -->
  <rect x="300" y="40" width="14" height="14" fill="url(#flash-grad)" rx="3"/>
  <text x="320" y="52" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#64748b">Gemini 3.5 Flash</text>
  <rect x="470" y="40" width="14" height="14" fill="url(#pro-grad)" rx="3"/>
  <text x="490" y="52" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#64748b">Gemini 3.1 Pro</text>

  <!-- Chart card -->
  <rect x="20" y="66" width="820" height="230" fill="white" rx="10" filter="url(#shadow)"/>

  <!-- Column A header -->
  <text x="220" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#94a3b8" letter-spacing="1">INPUT PRICE PER MILLION TOKENS</text>

  <!-- Column A bars -->
  <text x="170" y="133" text-anchor="end" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#1e293b">Flash</text>
  <rect x="180" y="124" width="105" height="18" fill="url(#flash-grad)" rx="4"/>
  <text x="293" y="137" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#b45309">$1.50/M</text>

  <text x="170" y="173" text-anchor="end" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#1e293b">Pro</text>
  <rect x="180" y="164" width="140" height="18" fill="url(#pro-grad)" rx="4"/>
  <text x="328" y="177" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#4338ca">~$2.00/M</text>

  <rect x="150" y="207" width="140" height="24" fill="#ecfdf5" rx="12" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="220" y="223" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" font-weight="800" fill="#065f46">Flash looks cheaper</text>

  <!-- Divider -->
  <line x1="430" y1="86" x2="430" y2="260" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="4 4"/>
  <circle cx="430" cy="173" r="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="430" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#94a3b8">≠</text>

  <!-- Column B header -->
  <text x="640" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#94a3b8" letter-spacing="1">FULL BENCHMARK SUITE COST</text>

  <!-- Column B bars -->
  <text x="590" y="133" text-anchor="end" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#1e293b">Flash</text>
  <rect x="600" y="124" width="235" height="18" fill="url(#flash-grad)" rx="4"/>
  <text x="827" y="137" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="white">$1,552</text>

  <text x="590" y="173" text-anchor="end" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#1e293b">Pro</text>
  <rect x="600" y="164" width="134" height="18" fill="url(#pro-grad)" rx="4"/>
  <text x="742" y="177" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#4338ca">~$887</text>

  <rect x="565" y="207" width="150" height="24" fill="#fef2f2" rx="12" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="640" y="223" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" font-weight="800" fill="#991b1b">Flash costs +75%</text>

  <!-- Bottom note -->
  <rect x="20" y="310" width="820" height="130" fill="white" rx="10" filter="url(#shadow)"/>
  <text x="40" y="336" font-family="system-ui,sans-serif" font-size="11" fill="#1e293b" font-weight="700">Why the flip:</text>
  <text x="132" y="336" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">input token usage jumped from more turns in agentic evaluation, and the per-token price itself rose 3× —</text>
  <text x="40" y="356" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">both factors stack, so a lower sticker price per token did not produce a lower total bill.</text>
  <text x="40" y="384" font-family="system-ui,sans-serif" font-size="11" fill="#1e293b" font-weight="700">Same eval suite, prior generation:</text>
  <text x="252" y="384" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Gemini 3 Flash cost ~$282 to run — Flash 3.5 costs 5.5× more than its own predecessor.</text>
  <text x="40" y="410" font-family="system-ui,sans-serif" font-size="9.5" fill="#94a3b8">Source: Artificial Analysis, "Gemini 3.5 Flash: The new leader in intelligence versus speed," May 19, 2026 (artificialanalysis.ai). Cost = full Intelligence Index eval suite, not list price.</text>
</svg>
