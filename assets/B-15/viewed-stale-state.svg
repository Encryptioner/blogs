<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <filter id="card-shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arr-fwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" fill="#f1f5f9" rx="10"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="2">VIEWED / STALE  ·  CONTENT-BASED FILE STATE MACHINE</text>

  <!-- Start dot -->
  <circle cx="60" cy="160" r="10" fill="#1e293b"/>
  <text x="60" y="186" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#64748b">start</text>

  <!-- State: Unviewed -->
  <rect x="120" y="124" width="160" height="72" fill="white" rx="10" filter="url(#card-shadow)" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="120" y="124" width="160" height="22" fill="#64748b" rx="10"/>
  <rect x="120" y="138" width="160" height="8" fill="#64748b"/>
  <text x="200" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="800" fill="white">UNVIEWED</text>
  <text x="200" y="166" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569">○  no marker</text>
  <text x="200" y="183" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">file appears in diff</text>

  <!-- State: Viewed -->
  <rect x="380" y="124" width="160" height="72" fill="white" rx="10" filter="url(#card-shadow)" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="380" y="124" width="160" height="22" fill="#16a34a" rx="10"/>
  <rect x="380" y="138" width="160" height="8" fill="#16a34a"/>
  <text x="460" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="800" fill="white">VIEWED</text>
  <text x="460" y="166" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569">✓  checkmark</text>
  <text x="460" y="183" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">user marked &amp; current</text>

  <!-- State: Stale -->
  <rect x="640" y="124" width="140" height="72" fill="white" rx="10" filter="url(#card-shadow)" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="640" y="124" width="140" height="22" fill="#f59e0b" rx="10"/>
  <rect x="640" y="138" width="140" height="8" fill="#f59e0b"/>
  <text x="710" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="800" fill="#1e293b">STALE</text>
  <text x="710" y="166" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569">●  amber dot</text>
  <text x="710" y="183" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">content changed since</text>

  <!-- start → unviewed -->
  <line x1="70" y1="160" x2="118" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arr-fwd)"/>

  <!-- unviewed → viewed -->
  <line x1="280" y1="160" x2="378" y2="160" stroke="#16a34a" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="329" y="151" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#16a34a">user marks viewed</text>
  <text x="329" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#64748b" font-style="italic">eye icon · right-click</text>

  <!-- viewed → stale -->
  <line x1="540" y1="160" x2="638" y2="160" stroke="#b45309" stroke-width="2" marker-end="url(#arr-amber)"/>
  <text x="589" y="151" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#b45309">commit changes file</text>
  <text x="589" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#64748b" font-style="italic">FNV-1a hash mismatch</text>

  <!-- stale → viewed (loop back below) -->
  <path d="M 660 196 C 660 240, 540 240, 540 196" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arr-green)"/>
  <text x="600" y="234" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#16a34a">re-read &amp; mark viewed</text>

  <!-- viewed → viewed (self loop, content unchanged) -->
  <path d="M 480 124 C 480 96, 540 96, 540 124" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arr-fwd)"/>
  <text x="510" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#1e293b">commit, content unchanged</text>
  <text x="510" y="106" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#64748b" font-style="italic">✓ marker preserved</text>

  <!-- Persistence note (sticky) -->
  <rect x="120" y="270" width="660" height="92" fill="#fef9c3" rx="8" filter="url(#card-shadow)" stroke="#facc15" stroke-width="1.5"/>
  <text x="142" y="294" font-family="system-ui,sans-serif" font-size="11" font-weight="800" fill="#713f12">📌  Persistence layer</text>
  <line x1="142" y1="303" x2="758" y2="303" stroke="#facc15" stroke-width="1"/>

  <text x="156" y="324" font-family="system-ui,sans-serif" font-size="11"><tspan font-weight="700" fill="#1e293b">localStorage</tspan> <tspan fill="#64748b">— fast UI · per-machine</tspan></text>
  <text x="156" y="343" font-family="system-ui,sans-serif" font-size="11"><tspan font-weight="700" fill="#1e293b">SQLite</tspan> <tspan fill="#64748b">— stable, cross-session, queryable via </tspan><tspan font-family="ui-monospace,monospace" fill="#1e40af">branchdiff info</tspan></text>
  <text x="500" y="324" font-family="system-ui,sans-serif" font-size="11"><tspan font-weight="700" fill="#1e293b">Repo fingerprint</tspan> <tspan fill="#64748b">— stable across forks</tspan></text>
  <text x="500" y="343" font-family="system-ui,sans-serif" font-size="11"><tspan font-weight="700" fill="#1e293b">Hash key</tspan> <tspan fill="#64748b">— content, not timestamp</tspan></text>
</svg>
