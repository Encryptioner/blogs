<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540">
  <defs>
    <filter id="card-shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arr-d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="540" fill="#f1f5f9" rx="10"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="2">CHOOSING THE RIGHT AI PASS  ·  WHAT DOES THE DIFF TOUCH?</text>

  <!-- Root: General review (always run) -->
  <rect x="270" y="48" width="260" height="56" fill="#475569" rx="10" filter="url(#card-shadow)"/>
  <text x="400" y="70" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="white">🔍  General Review (baseline)</text>
  <text x="400" y="88" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#fbbf24">/branchdiff-review</text>
  <text x="400" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#cbd5e1">must-fix · suggestion · nit · question</text>

  <!-- Connector down -->
  <line x1="400" y1="104" x2="400" y2="124" stroke="#475569" stroke-width="2" marker-end="url(#arr-d)"/>

  <!-- Decision row -->
  <rect x="40" y="124" width="720" height="32" fill="#1e293b" rx="6"/>
  <text x="400" y="146" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">Then ask: what does this diff actually touch?  →  add focused passes</text>

  <!-- 4 question/answer columns -->
  <!-- Column 1: Security -->
  <line x1="125" y1="156" x2="125" y2="176" stroke="#475569" stroke-width="2" marker-end="url(#arr-d)"/>
  <rect x="40" y="180" width="170" height="58" fill="white" rx="8" filter="url(#card-shadow)" stroke="#cbd5e1" stroke-width="1"/>
  <text x="125" y="202" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#1e293b">Auth, input handling,</text>
  <text x="125" y="218" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#1e293b">or web-facing code?</text>
  <text x="125" y="232" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#94a3b8">— question —</text>

  <line x1="125" y1="238" x2="125" y2="258" stroke="#475569" stroke-width="2" marker-end="url(#arr-d)"/>
  <rect x="40" y="262" width="170" height="172" fill="#ef4444" rx="10" filter="url(#card-shadow)"/>
  <text x="125" y="288" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20">🔒</text>
  <text x="125" y="312" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="white">Security Audit</text>
  <line x1="55" y1="324" x2="195" y2="324" stroke="white" stroke-opacity="0.3"/>
  <text x="125" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="white">Injection</text>
  <text x="125" y="358" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="white">Secret leaks</text>
  <text x="125" y="374" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="white">Weak crypto</text>
  <text x="125" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="white">Broken authz</text>
  <text x="125" y="406" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="white">SSRF</text>
  <text x="125" y="422" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="white">Deserialization</text>

  <!-- Column 2: Test gaps -->
  <line x1="315" y1="156" x2="315" y2="176" stroke="#475569" stroke-width="2" marker-end="url(#arr-d)"/>
  <rect x="230" y="180" width="170" height="58" fill="white" rx="8" filter="url(#card-shadow)" stroke="#cbd5e1" stroke-width="1"/>
  <text x="315" y="202" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#1e293b">New functions, branches,</text>
  <text x="315" y="218" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#1e293b">or error paths?</text>
  <text x="315" y="232" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#94a3b8">— question —</text>

  <line x1="315" y1="238" x2="315" y2="258" stroke="#475569" stroke-width="2" marker-end="url(#arr-d)"/>
  <rect x="230" y="262" width="170" height="172" fill="#3b82f6" rx="10" filter="url(#card-shadow)"/>
  <text x="315" y="288" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20">🧪</text>
  <text x="315" y="312" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="white">Test Coverage</text>
  <line x1="245" y1="324" x2="385" y2="324" stroke="white" stroke-opacity="0.3"/>
  <text x="315" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="white">Walks new branches</text>
  <text x="315" y="358" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="white">Flags uncovered paths</text>
  <text x="315" y="374" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="white">Generates it(...) stubs</text>
  <line x1="245" y1="382" x2="385" y2="382" stroke="white" stroke-opacity="0.3"/>
  <text x="315" y="400" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#dbeafe">Priority order:</text>
  <text x="315" y="416" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#dbeafe">errors → API → edges</text>

  <!-- Column 3: Breaking change -->
  <line x1="505" y1="156" x2="505" y2="176" stroke="#475569" stroke-width="2" marker-end="url(#arr-d)"/>
  <rect x="420" y="180" width="170" height="58" fill="white" rx="8" filter="url(#card-shadow)" stroke="#cbd5e1" stroke-width="1"/>
  <text x="505" y="202" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#1e293b">Public API or</text>
  <text x="505" y="218" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#1e293b">library changes?</text>
  <text x="505" y="232" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#94a3b8">— question —</text>

  <line x1="505" y1="238" x2="505" y2="258" stroke="#475569" stroke-width="2" marker-end="url(#arr-d)"/>
  <rect x="420" y="262" width="170" height="172" fill="#f59e0b" rx="10" filter="url(#card-shadow)"/>
  <text x="505" y="288" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20">⚠️</text>
  <text x="505" y="312" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#1e293b">Breaking Change</text>
  <line x1="435" y1="324" x2="575" y2="324" stroke="#1e293b" stroke-opacity="0.2"/>
  <text x="505" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="#1e293b">Classifies each change</text>
  <text x="505" y="358" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="#1e293b">Drafts UPGRADE.md</text>
  <text x="505" y="374" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="#1e293b">Flags no-rollback</text>
  <text x="505" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="#1e293b">migrations</text>
  <line x1="435" y1="398" x2="575" y2="398" stroke="#1e293b" stroke-opacity="0.2"/>
  <text x="505" y="418" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#78350f" font-style="italic">major / minor / patch</text>

  <!-- Column 4: Deps -->
  <line x1="695" y1="156" x2="695" y2="176" stroke="#475569" stroke-width="2" marker-end="url(#arr-d)"/>
  <rect x="610" y="180" width="170" height="58" fill="white" rx="8" filter="url(#card-shadow)" stroke="#cbd5e1" stroke-width="1"/>
  <text x="695" y="202" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#1e293b">New or bumped</text>
  <text x="695" y="218" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#1e293b">dependencies?</text>
  <text x="695" y="232" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#94a3b8">— question —</text>

  <line x1="695" y1="238" x2="695" y2="258" stroke="#475569" stroke-width="2" marker-end="url(#arr-d)"/>
  <rect x="610" y="262" width="170" height="172" fill="#8b5cf6" rx="10" filter="url(#card-shadow)"/>
  <text x="695" y="288" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20">📦</text>
  <text x="695" y="312" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="white">Dependency</text>
  <line x1="625" y1="324" x2="765" y2="324" stroke="white" stroke-opacity="0.3"/>
  <text x="695" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="white">Maintenance signals</text>
  <text x="695" y="358" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="white">License compatibility</text>
  <text x="695" y="374" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="white">Bundle-size impact</text>
  <text x="695" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="white">CVE / advisory check</text>

  <!-- Bottom callout -->
  <rect x="40" y="466" width="720" height="56" fill="white" rx="10" filter="url(#card-shadow)"/>
  <text x="60" y="488" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#1e293b">💡  Stack passes, don't replace.</text>
  <text x="60" y="506" font-family="system-ui,sans-serif" font-size="10.5" fill="#475569">Run general review first, then add the focused passes that match the diff. A 200-line auth diff with security audit produces</text>
  <text x="60" y="518" font-family="system-ui,sans-serif" font-size="10.5" fill="#475569"><tspan font-weight="700">5 precise comments instead of 50</tspan> — you put real attention on intent, AI handles the mechanical sweep.</text>
</svg>
